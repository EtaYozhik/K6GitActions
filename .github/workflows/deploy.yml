name: CDK Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Clears the Node.js deprecation warning

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      session-name: ${{ steps.session-naming.outputs.session-name }}
      environment: ${{ steps.detect-env.outputs.environment }}
      account: ${{ steps.detect-env.outputs.account }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect environment
        id: detect-env
        run: |
          BRANCH_NAME="${{ github.ref }}"
          if [[ "${BRANCH_NAME}" == "refs/heads/main" ]]; then
              ENV="staging"
              ACCOUNT="827602716979"
          else
              ENV="dev"
              ACCOUNT="827602716979"
          fi
          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          echo "account=${ACCOUNT}" >> $GITHUB_OUTPUT

      - name: Extract student information
        id: student-info
        run: |
          STUDENT_NAME="${{ github.actor }}"
          echo "name=${STUDENT_NAME}" >> $GITHUB_OUTPUT
          echo "Student: ${STUDENT_NAME}"

      - name: Generate enhanced session name
        id: session-naming
        run: |
          # Clean username for valid AWS characters (Alphanumeric, =,.@_-)
          STUDENT=$(echo "${{ github.actor }}" | sed 's/[^a-zA-Z0-9=,.@_-]//g')
          RUN_ID="${{ github.run_id }}"
          
          # Create base name
          BASE_NAME="gha-cdk-${STUDENT}-${RUN_ID}"
          
          # Strictly truncate to 64 characters maximum
          SESSION_NAME=$(echo "${BASE_NAME}" | cut -c 1-64)

          echo "session-name=${SESSION_NAME}" >> $GITHUB_OUTPUT
          echo "Generated safe session name: ${SESSION_NAME}"
          echo "Length: ${#SESSION_NAME} characters"

  deploy:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: ${{ needs.setup.outputs.session-name }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify OIDC credentials
        run: |
          echo "Verifying AWS credentials..."
          IDENTITY=$(aws sts get-caller-identity)
          echo "Assumed role:"
          echo "${IDENTITY}" | jq '.'
          ROLE_SESSION=$(echo "${IDENTITY}" | jq -r '.Arn' | grep -oP '(?<=/)[^/]+$')
          echo "Current session: ${ROLE_SESSION}"

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: CDK Deploy
        run: cdk deploy --require-approval never
